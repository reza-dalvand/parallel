<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پروژه پایانی درس پردازش موازی</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2em;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: all 0.3s;
            background: white;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        select:disabled {
            background: #f5f5f5;
            cursor: not-allowed;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: center;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1> پروژه پایانی درس پردازش موازی</h1>

        <form method="post" action="{% url 'core:run_scenario' %}">
            {% csrf_token %}

            <div class="form-group">
                <label for="method">۱. روش پردازش موازی:</label>
                <select name="method" id="method" required>
                    <option value="">-- انتخاب کنید --</option>
                    <option value="thread">Thread (نخ)</option>
                    <option value="processes">Process (فرآیند)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="tool">۲. ابزار همزمانی / سناریو:</label>
                <select name="tool" id="tool" required disabled>
                    <option value="">-- ابتدا روش را انتخاب کنید --</option>
                </select>
            </div>

            <div class="form-group">
                <label for="scenario_num">۳. شماره سناریو (۱ تا ۳):</label>
                <select name="scenario_num" id="scenario_num" required disabled>
                    <option value="">-- ابتدا ابزار را انتخاب کنید --</option>
                    <option value="1">سناریو ۱</option>
                    <option value="2">سناریو ۲</option>
                    <option value="3">سناریو ۳</option>
                </select>
            </div>

            <button type="submit" id="submitBtn" disabled>اجرای سناریو</button>
        </form>
    </div>

    <script>
        const scenarios = {
            'thread': [
                { value: 'defining_thread', text: 'Defining a thread' },
                { value: 'current_thread', text: 'Determining the current thread' },
                { value: 'thread_subclass', text: 'Defining a thread subclass' },
                { value: 'lock', text: 'Thread synchronization with a lock' },
                { value: 'rlock', text: 'Thread synchronization with RLock' },
                { value: 'semaphore', text: 'Thread synchronization with a semaphore' },
                { value: 'barrier', text: 'Thread synchronization with a barrier' },
                { value: 'event', text: 'Thread synchronization with a event' },
                { value: 'condition', text: 'Thread synchronization with condition' },
                { value: 'queue', text: 'Thread synchronization with queue' },
            ],
            'processes': [
                { value: 'spawning', text: 'Spawning a process' },
                { value: 'naming', text: 'Naming a process' },
                { value: 'background', text: 'Running processes in the background' },
                { value: 'killing', text: 'Killing a process' },
                { value: 'subclass', text: 'Defining processes in a subclass' },
                { value: 'queue', text: 'Using a queue to exchange data' },
                { value: 'synchronization', text: 'Synchronization between processes' },
                { value: 'pool', text: 'Using a pool of processes' }
            ]
        };

        const methodSelect = document.getElementById('method');
        const toolSelect = document.getElementById('tool');
        const scenarioNumSelect = document.getElementById('scenario_num');
        const submitBtn = document.getElementById('submitBtn');

        methodSelect.addEventListener('change', function() {
            toolSelect.innerHTML = '<option value="">-- انتخاب کنید --</option>';
            scenarioNumSelect.value = '';
            scenarioNumSelect.disabled = true;
            submitBtn.disabled = true;

            const selectedMethod = this.value;
            if (selectedMethod && scenarios[selectedMethod]) {
                scenarios[selectedMethod].forEach(scenario => {
                    const option = document.createElement('option');
                    option.value = scenario.value;
                    option.textContent = scenario.text;
                    toolSelect.appendChild(option);
                });
                toolSelect.disabled = false;
            } else {
                toolSelect.disabled = true;
            }
        });

        toolSelect.addEventListener('change', function() {
            if (this.value) {
                scenarioNumSelect.disabled = false;
            } else {
                scenarioNumSelect.disabled = true;
                scenarioNumSelect.value = '';
                submitBtn.disabled = true;
            }
        });

        scenarioNumSelect.addEventListener('change', function() {
            if (this.value && toolSelect.value && methodSelect.value) {
                submitBtn.disabled = false;
            } else {
                submitBtn.disabled = true;
            }
        });
    </script>
</body>
</html>
